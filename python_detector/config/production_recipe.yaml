recipe_id: seat_a_black_leather_production_v1
sku: seat_a_black_leather
light_order:
  - DIFFUSE
  - POLAR_DIFFUSE
  - HIGH_LEFT
v4_lights:
  semantic_to_light_id:
    DOME: DIFFUSE
    DARKFIELD_L: HIGH_LEFT
    BRIGHTFIELD: POLAR_DIFFUSE
camera_defaults:
  model_key: patchcore_detector
  roi_template: python_detector/config/roi/production_full_roi.yaml
  base_light_id: POLAR_DIFFUSE
  light_order: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT]
  roi_models:
    seat: patchcore_detector
cameras:
  TOP_BACK:
    calibration_id: calib/top_back_production_v1
  TOP_CUSHION:
    calibration_id: calib/top_cushion_production_v1
quality:
  required_lights: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT]
  max_saturation_ratio: 0.40
  max_dark_ratio: 0.40
  min_mean_gray: 0
  max_mean_gray: 255
  min_sharpness: 1.0
  min_motion_gradient: 1.0
  max_light_mean_delta: 80
  max_registration_error_px: 1.5
  max_capture_span_us: 1000000
  max_exposure_delta_us: 200
  max_gain_delta: 0.2
  require_monotonic_timestamps: true
  require_unique_frame_indices: true
roi_locator:
  backend: onnx_yolo_seg
  dome_semantic_light: DOME
  model_path: model/roi_yolo/seat_roi_seg.onnx
  min_confidence: 0.50
  mask_threshold: 0.50
  min_mask_area_px: 50000
  min_mask_area_ratio: 0.05
  max_mask_area_ratio: 0.95
  input_width: 1024
  input_height: 1024
  input_channels: 3
  max_pose_error_px: 4.0
  output_decode: ultralytics_yolo_seg
  bbox_format: xyxy_pixel
  class_names: [seat]
  fail_policy: RECHECK
registration:
  base_light_id: POLAR_DIFFUSE
  base_light_fallback: DIFFUSE
  fail_policy: RECHECK
  method: ecc
  max_iterations: 30
  convergence_epsilon: 0.0001
  search_radius_px: 2
  min_correlation: 0.05
fusion:
  iou_threshold: 0.5
  max_candidates_per_roi: 16
decision_threshold:
  min_area_px: 1
models:
  default:
    backend: fake
    fake_mode: auto
    model_family: patchcore
    role: primary
  patchcore_detector:
    backend: patchcore_knn
    model_family: patchcore
    role: primary
    input_channels:
      - light:DIFFUSE
      - light:POLAR_DIFFUSE
      - light:HIGH_LEFT
    embedding_backend: onnx_wideresnet50
    embedding_model_path: model/wideresnet50/seat_wrn50_embedding.onnx
    embedding_version: wrn50_seat_v1
    embedding_dim: 1536
    embedding_layers: [layer2, layer3]
    pca_path: model/patchcore/seat_pca.json
    pca_version: pca_seat_v3
    memory_bank_path: model/patchcore/seat_patchcore_bank.json
    faiss_index_path: model/patchcore/seat_patchcore.faiss
    coreset_ratio: 1.0
    knn_k: 1
    spatial_mode: true
    spatial_layers: [layer2, layer3]
    spatial_upsample_height: 128
    spatial_upsample_width: 128
    anomaly_binarize_min_ratio: 0.5
    anomaly_binarize_relative: 0.55
trace:
  enabled: true
  root_dir: trace
  save_ok_ratio: 0.01
  save_ng: true
  save_recheck: true
