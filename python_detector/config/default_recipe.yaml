recipe_id: seat_a_black_leather_v1
sku: seat_a_black_leather
light_order:
  - DIFFUSE
  - POLAR_DIFFUSE
  - HIGH_LEFT
  - HIGH_RIGHT
v4_lights:
  semantic_to_light_id:
    DOME: DIFFUSE
    DARKFIELD_L: HIGH_LEFT
    DARKFIELD_R: HIGH_RIGHT
    BRIGHTFIELD: POLAR_DIFFUSE
camera_defaults:
  model_key: fake_default
  safety_net_model_key: unknown_safety_net
  roi_template: python_detector/config/roi/default_roi.yaml
  calibration_id: calib/simulated_v1
  base_light_id: POLAR_DIFFUSE
  light_order: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT, HIGH_RIGHT]
  roi_models:
    seat: fake_default
  roi_safety_net_models:
    seat: unknown_safety_net
cameras:
  TOP_BACK: {}
  TOP_CUSHION: {}
quality:
  required_lights:
    - DIFFUSE
    - POLAR_DIFFUSE
    - HIGH_LEFT
    - HIGH_RIGHT
  max_saturation_ratio: 0.01
  min_mean_gray: 20
  max_mean_gray: 235
  min_sharpness: 1.0
  min_motion_gradient: 1.0
  max_light_mean_delta: 80
  max_registration_error_px: 1.5
  max_capture_span_us: 500000
  max_exposure_delta_us: 200
  max_gain_delta: 0.2
  require_monotonic_timestamps: true
  require_unique_frame_indices: true
roi_locator:
  backend: template
  dome_semantic_light: DOME
  min_confidence: 0.50
  max_pose_error_px: 4.0
  output_decode: yolo_xyxy_rows
  bbox_format: xyxy_pixel
  class_names:
    - seat
  fail_policy: RECHECK
registration:
  base_light_id: POLAR_DIFFUSE
  base_light_fallback: DIFFUSE
  fail_policy: RECHECK
  method: fixed_calibration
  max_iterations: 30
  convergence_epsilon: 0.0001
  search_radius_px: 2
  min_correlation: 0.05
fusion:
  iou_threshold: 0.5
  class_aware: true
  max_candidates_per_roi: 16
thresholds:
  scratch:
    ng_score: 0.35
    recheck_score: 0.20
    min_area_px: 8
  dent:
    ng_score: 0.30
    recheck_score: 0.18
    min_area_px: 20
  unknown_anomaly:
    ng_score: 0.55
    recheck_score: 0.20
    min_area_px: 1
models:
  default:
    backend: fake
    fake_mode: auto
    model_family: supervised
    role: primary
  fake_default:
    backend: fake
    fake_mode: auto
    model_family: supervised
    role: primary
  unknown_safety_net:
    backend: fake
    fake_mode: ok
    model_family: patchcore
    role: safety_net
    class_names:
      - unknown_anomaly
    score_threshold: 0.20
    embedding_backend: statistical
    embedding_version: simulated_stat_v1
    embedding_dim: 10
    embedding_layers:
      - stat_pool
    coreset_ratio: 1.0
    knn_k: 1
    anomaly_score_scale: 1.0
trace:
  enabled: true
  root_dir: trace
  save_ok_ratio: 0.0
  save_ng: true
  save_recheck: true
