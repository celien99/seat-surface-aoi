recipe_id: seat_a_robot_flyshot_production_v1
sku: seat_a_black_leather
light_order:
  - DIFFUSE
  - POLAR_DIFFUSE
  - HIGH_LEFT
  - HIGH_RIGHT
v4_lights:
  semantic_to_light_id:
    DOME: DIFFUSE
    DARKFIELD_L: HIGH_LEFT
    DARKFIELD_R: HIGH_RIGHT
    BRIGHTFIELD: POLAR_DIFFUSE
camera_defaults:
  model_key: supervised_defect_onnx
  safety_net_model_key: patchcore_unknown_safety_net
  roi_template: python_detector/config/roi/production_full_roi.yaml
  base_light_id: POLAR_DIFFUSE
  light_order: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT, HIGH_RIGHT]
  roi_models:
    seat: supervised_defect_onnx
  roi_safety_net_models:
    seat: patchcore_unknown_safety_net
cameras:
  T1_BACKREST:
    camera_id: EYE_IN_HAND
    pose_id: T1_BACKREST
    calibration_id: calib/t1_robot_v1
  T2_CUSHION:
    camera_id: EYE_IN_HAND
    pose_id: T2_CUSHION
    calibration_id: calib/t2_robot_v1
quality:
  required_lights: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT, HIGH_RIGHT]
  max_saturation_ratio: 0.01
  min_mean_gray: 20
  max_mean_gray: 235
  min_sharpness: 1.0
  min_motion_gradient: 1.0
  max_light_mean_delta: 80
  max_registration_error_px: 1.5
  max_capture_span_us: 500000
  max_exposure_delta_us: 200
  max_gain_delta: 0.2
  require_monotonic_timestamps: true
  require_unique_frame_indices: true
roi_locator:
  backend: onnx_yolo_seg
  dome_semantic_light: DOME
  model_path: model/roi_yolo/seat_roi_seg.onnx
  min_confidence: 0.50
  mask_threshold: 0.50
  min_mask_area_px: 50000
  max_mask_area_ratio: 0.95
  input_width: 1024
  input_height: 1024
  input_channels: 3
  max_pose_error_px: 4.0
  output_decode: ultralytics_yolo_seg
  bbox_format: xyxy_pixel
  class_names: [seat]
  fail_policy: RECHECK
registration:
  base_light_id: POLAR_DIFFUSE
  base_light_fallback: DIFFUSE
  fail_policy: RECHECK
  method: ecc
  max_iterations: 30
  convergence_epsilon: 0.0001
  search_radius_px: 2
  min_correlation: 0.05
fusion:
  iou_threshold: 0.5
  class_aware: true
  max_candidates_per_roi: 16
thresholds:
  scratch:
    ng_score: 0.35
    recheck_score: 0.20
    min_area_px: 8
  dent:
    ng_score: 0.30
    recheck_score: 0.18
    min_area_px: 20
  unknown_anomaly:
    ng_score: 0.55
    recheck_score: 0.20
    min_area_px: 1
models:
  default:
    backend: fake
    fake_mode: auto
    model_family: supervised
    role: primary
  supervised_defect_onnx:
    backend: onnx
    model_path: model/supervised_defect/seat_defect_detector.onnx
    model_family: supervised
    role: primary
    input_channels:
      - ch0_diffuse
      - ch1_polar_diffuse
      - ch2_high_left
      - ch3_high_right
      - ch4_high_max_min
    input_scale: 255.0
    class_names: [scratch, dent]
    output_decode: ultralytics_yolo
    bbox_format: xyxy_pixel
    score_threshold: 0.20
  patchcore_unknown_safety_net:
    backend: patchcore_knn
    model_family: patchcore
    role: safety_net
    class_names: [unknown_anomaly]
    input_channels:
      - ch0_diffuse
      - ch1_polar_diffuse
      - ch2_high_left
      - ch3_high_right
      - ch4_high_max_min
    embedding_backend: onnx_wideresnet50
    embedding_model_path: model/wideresnet50/seat_wrn50_embedding.onnx
    embedding_version: wrn50_seat_v1
    embedding_dim: 1024
    embedding_layers: [layer2, layer3]
    pca_path: model/patchcore/seat_pca.json
    pca_version: pca_seat_v1
    memory_bank_path: model/patchcore/seat_patchcore_bank.json
    faiss_index_path: model/patchcore/seat_patchcore.faiss
    coreset_ratio: 0.1
    knn_k: 1
    anomaly_score_scale: 1.0
    score_threshold: 0.20
trace:
  enabled: true
  root_dir: trace
  save_ok_ratio: 0.01
  save_ng: true
  save_recheck: true
