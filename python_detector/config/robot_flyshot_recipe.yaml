recipe_id: seat_a_robot_flyshot_v1
sku: seat_a_black_leather
light_order:
  - DIFFUSE
  - POLAR_DIFFUSE
  - HIGH_LEFT
v4_lights:
  semantic_to_light_id:
    DOME: DIFFUSE
    DARKFIELD_L: HIGH_LEFT
    BRIGHTFIELD: POLAR_DIFFUSE
camera_defaults:
  model_key: fake_default
  safety_net_model_key: patchcore_safety_net
  roi_template: python_detector/config/roi/default_roi.yaml
  base_light_id: POLAR_DIFFUSE
  light_order: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT]
  roi_models:
    seat: fake_default
  roi_safety_net_models:
    seat: patchcore_safety_net
cameras:
  T1_BACKREST:
    camera_id: EYE_IN_HAND
    pose_id: T1_BACKREST
    calibration_id: calib/t1_simulated_v1
  T2_CUSHION:
    camera_id: EYE_IN_HAND
    pose_id: T2_CUSHION
    calibration_id: calib/t2_simulated_v1
quality:
  required_lights: [DIFFUSE, POLAR_DIFFUSE, HIGH_LEFT]
  max_saturation_ratio: 0.01
  min_mean_gray: 20
  max_mean_gray: 235
  min_sharpness: 1.0
  min_motion_gradient: 1.0
  max_light_mean_delta: 80
  max_registration_error_px: 1.5
  max_capture_span_us: 500000
  max_exposure_delta_us: 200
  max_gain_delta: 0.2
  require_monotonic_timestamps: true
  require_unique_frame_indices: true
roi_locator:
  backend: template
  dome_semantic_light: DOME
  min_confidence: 0.50
  max_pose_error_px: 4.0
  output_decode: yolo_xyxy_rows
  bbox_format: xyxy_pixel
  class_names: [seat]
  fail_policy: RECHECK
registration:
  base_light_id: POLAR_DIFFUSE
  base_light_fallback: DIFFUSE
  fail_policy: RECHECK
  method: fixed_calibration
  max_iterations: 30
  convergence_epsilon: 0.0001
  search_radius_px: 2
  min_correlation: 0.05
fusion:
  iou_threshold: 0.5
  max_candidates_per_roi: 16
decision_threshold:
  ng_score: 0.35
  recheck_score: 0.20
  min_area_px: 8
models:
  fake_default:
    backend: fake
    fake_mode: auto
    model_family: supervised
    role: primary
  patchcore_safety_net:
    backend: fake
    fake_mode: ok
    model_family: patchcore
    role: safety_net
    embedding_backend: statistical
    embedding_version: robot_flyshot_stat_v1
    embedding_dim: 10
    embedding_layers: [stat_pool]
    coreset_ratio: 1.0
    knn_k: 1
trace:
  enabled: true
  root_dir: trace
  save_ok_ratio: 0.0
  save_ng: true
  save_recheck: true
