# C++ 主控生产配置模板。
# 用法：
# 1. 复制本文件为 station_runtime.production.conf。
# 2. 把 TODO_* 替换成现场真实 PLC、相机、频闪参数。
# 3. 运行：
#    cpp_controller/build/seat_aoi_controller --config cpp_controller/config/station_runtime.production.conf --validate-config
#
# 注意：当前仓库已经提供生产配置校验和真实 backend 选择入口，但尚未链接具体厂商 SDK。
# 配置校验通过后，如直接运行非 simulated backend，程序会 fail-fast 提示需要接入对应驱动。
# 当前固定机位基线硬件：
# - 相机：海康 MV-CH120-20GC，4096 x 3072，Hikrobot MVS backend。
# - 镜头：MVL-KF0814M-12MPE FA 镜头，8mm F1.4，1.1"，C 接口。
# - 频闪控制器：FL-ACDH-20048-4，4 通道。
# - PLC 可先用手动/模拟触发测试相机、频闪、共享内存和 Python 收图链路。

hardware_mode=production

# 可选值：
# PLC: modbus_tcp / siemens_s7 / ethercat_io / digital_io / vendor_sdk / custom_sdk
# Camera: basler_pylon / hikrobot_mvs / daheng_galaxy / flir_spinnaker / vendor_sdk / custom_sdk
# Light: serial_ascii / modbus_tcp / ethercat_io / digital_io / vendor_sdk / custom_sdk
plc.backend=modbus_tcp
camera.backend=hikrobot_mvs
light.backend=serial_ascii

reset_shared_memory=true
slot_count=4
# 单相机 4096x3072 Mono8 x 4 光源约 48 MB；64 MB 留给 header/meta 和小余量。
# 如果后续增加第二个同分辨率固定机位，frame_slot_size 至少提高到 134217728。
frame_slot_size=67108864
result_slot_size=65536

publish_timeout_ms=1000
detector_timeout_ms=5000
trigger_timeout_ms=1000
camera_timeout_ms=300
light_timeout_ms=300
warning_recheck_threshold=3
critical_recheck_threshold=5
max_jobs=0

recipe_id=seat_a_black_leather_production_v1
capture_mode=fixed_camera
light_order=1,2,3,4
trigger_sync_mode=camera_exposure_output
trace_root=trace

# PLC 通信和点位。
# host/port 适用于 Modbus TCP 或 Siemens S7；EtherCAT/IO 卡可把站号/设备名填到 station_id。
plc.host=TODO_PLC_IP
plc.port=502
plc.station_id=TODO_LINE1_STATION_AOI
plc.trigger_source=TODO_DI_OR_REGISTER_TRIGGER
plc.trigger_id_source=TODO_REGISTER_TRIGGER_ID
plc.seat_id_source=TODO_REGISTER_OR_SCANNER_SEAT_ID
plc.sku_source=TODO_REGISTER_OR_MES_SKU
plc.ok_output=TODO_DO_OK
plc.ng_output=TODO_DO_NG
plc.recheck_output=TODO_DO_RECHECK
plc.ack_input=TODO_DI_PLC_ACK
plc.output_hold_ms=200

# 相机配置。camera.<N> 中的 N 是共享内存里的 camera_index。
# serial_number 必须是 Hikrobot MVS 工具里看到的 MV-CH120-20GC 真实序列号。
# 镜头为 MVL-KF0814M-12MPE，8mm F1.4，1.1"，C 接口；镜头信息不作为运行配置字段解析。
camera.0.camera_id=TOP_BACK
camera.0.serial_number=TODO_CAMERA_SN_TOP_BACK
camera.0.calibration_id=calib/top_back_production_v1
camera.0.width=4096
camera.0.height=3072
camera.0.channels=1
camera.0.pixel_format=Mono8
camera.0.trigger_line=Line0
camera.0.exposure_output_line=Line1
camera.0.buffer_count=8

# 频闪控制器通信。
# serial_ascii 示例用串口；如果现场是网口/SDK，填写 light.host/light.port 或 light.device_id。
light.device_id=FL-ACDH-20048-4
light.serial_port=/dev/ttyUSB0
light.baud_rate=115200
light.trigger_input_line=TODO_TRIGGER_IN_FROM_CAMERA_EXPOSURE_OUT

# 逻辑光源到频闪控制器物理通道的映射。
# light.<N>.physical_channel 是频闪控制器真实输出通道。
# exposure_us 是当前光源轮次相机曝光时间；strobe_width_us 必须落在曝光窗口内。
# FL-ACDH-20048-4 为 4 通道频闪控制器，默认按 light_index 1..4 映射到物理通道 1..4。
light.1.physical_channel=1
light.1.exposure_us=800
light.1.strobe_width_us=700
light.1.trigger_delay_us=10
light.1.gain=1.0
light.1.current_percent=60

light.2.physical_channel=2
light.2.exposure_us=800
light.2.strobe_width_us=700
light.2.trigger_delay_us=10
light.2.gain=1.0
light.2.current_percent=60

light.3.physical_channel=3
light.3.exposure_us=800
light.3.strobe_width_us=650
light.3.trigger_delay_us=10
light.3.gain=1.0
light.3.current_percent=55

light.4.physical_channel=4
light.4.exposure_us=800
light.4.strobe_width_us=650
light.4.trigger_delay_us=10
light.4.gain=1.0
light.4.current_percent=55

# 生产配置禁止打开故障注入。
simulate_light_fault=false
simulate_missing_frame=false
simulate_plc_output_fault=false
simulate_trigger_timeout=false
