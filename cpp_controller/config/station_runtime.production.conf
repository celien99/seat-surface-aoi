# ============================================================================
# 座椅表面 AOI 生产配置 — 固定双机位 + 三光源频闪
# ============================================================================
# 硬件清单：
#   相机：海康 MV-CH120-20GC × 2（SN: DA9184656 / DA9184665）
#   镜头：MVL-KF0814M-12MPE FA 镜头，8mm F1.4，1.1"，C 接口
#   频闪控制器：FL-ACDH-20048-4，4 通道（使用通道 1/2/3）
#   光源：3 组（light_index 1/2/3 → physical_channel 1/2/3）
# ============================================================================
# 接线方案（FL-ACDH 做时序主站）：
#   PC RS232(TX/RX/GND) → FL-ACDH 串口
#   FL-ACDH F口同步输出 → 相机A Line0 + 相机B Line0（并联）
#   相机A/B Line1 (ExposureStartActive) 预留，调试用
#   FL-ACDH 通道1/2/3 → 光源1/2/3
# ============================================================================
# 采集时序：
#   光源1频闪：TOP_BACK + TOP_CUSHION 同时拍摄
#   光源2频闪：TOP_BACK + TOP_CUSHION 同时拍摄
#   光源3频闪：TOP_BACK + TOP_CUSHION 同时拍摄
#   单次检测产出：2视角 × 3光源 = 6 张 Mono8 图像
# ============================================================================

hardware_mode=production

# ----- 后端选择 -----
# Signal: tcp_signal（TCP 监听 PLC SN）/ external_signal（文件队列）
# Camera: hikrobot_mvs
# Light:  serial_ascii（FL-ACDH RS232 协议）
signal.backend=tcp_signal
camera.backend=hikrobot_mvs
light.backend=serial_ascii

# ----- 共享内存 -----
reset_shared_memory=true
slot_count=4
# 2 相机 × 3 光源 = 6 帧 × 4096×3072 Mono8 ≈ 72 MB 图像数据
# 128 MB 留足 header / meta / safety margin
frame_slot_size=134217728
result_slot_size=65536

# ----- 超时配置 -----
publish_timeout_ms=1000
detector_timeout_ms=5000
trigger_timeout_ms=1000
camera_timeout_ms=500
light_timeout_ms=300

# ----- 健康阈值 -----
warning_recheck_threshold=3
critical_recheck_threshold=5

# ----- 任务与配方 -----
max_jobs=0
recipe_id=seat_a_black_leather_production_v1
capture_mode=fixed_camera
capture_schedule=shared_light_parallel
light_order=1,2,3
trace_root=trace

# ============================================================================
# TCP 信号客户端（C++ 作为 TCP 服务端，监听 PLC 发送 SN）
# ============================================================================
# 当 signal.backend=tcp_signal 时：
#   - C++ 在 signal.port 上监听 TCP 连接
#   - PLC 发送 "SN\n" → C++ 回复 "ok\n" → 开始采集
#   - 检测完成后通过 result_host:result_port 回传结果
signal.station_id=LINE1_AOI_01
signal.default_seat_id=EXTERNAL_SEAT
signal.default_sku=seat_a_black_leather
signal.port=9000
signal.delimiter=
signal.terminator=\n
signal.ok_response=ok\n

# TCP 结果回传（检测完成后发送 result|seat_id|OK/NG/RECHECK\n）
signal.result_host=192.168.1.100
signal.result_port=9001
signal.result_prefix=result
signal.result_delimiter=|
signal.ok_text=OK
signal.ng_text=NG
signal.recheck_text=RECHECK
signal.error_text=ERROR

# 文件队列路径（external_signal 模式使用，tcp_signal 模式留空）
signal.trigger_queue_path=
signal.result_queue_path=

# ============================================================================
# 相机 0 — TOP_BACK（靠背顶部视角）
# ============================================================================
camera.0.camera_id=TOP_BACK
camera.0.serial_number=DA9184656
camera.0.calibration_id=calib/top_back_production_v1
camera.0.width=4096
camera.0.height=3072
camera.0.channels=1
camera.0.pixel_format=Mono8
# 硬件触发：FL-ACDH F口同步输出 → Line0
camera.0.trigger_line=Line0
# 曝光输出：Line1 输出 ExposureStartActive（调试/预留）
camera.0.exposure_output_line=Line1
camera.0.buffer_count=8

# ============================================================================
# 相机 1 — TOP_CUSHION（坐垫顶部视角）
# ============================================================================
camera.1.camera_id=TOP_CUSHION
camera.1.serial_number=DA9184665
camera.1.calibration_id=calib/top_cushion_production_v1
camera.1.width=4096
camera.1.height=3072
camera.1.channels=1
camera.1.pixel_format=Mono8
# 硬件触发：与相机0共用 FL-ACDH F口同步输出（并联）
camera.1.trigger_line=Line0
camera.1.exposure_output_line=Line1
camera.1.buffer_count=8

# ============================================================================
# FL-ACDH-20048-4 频闪控制器（RS232 串口）
# ============================================================================
light.device_id=FL-ACDH-20048-4
# Windows 下确认设备管理器中的 COM 端口号，通常为 COM3
light.serial_port=COM3
light.baud_rate=115200
# 预留：相机 ExposureOut(Line1) → FL-ACDH Trigger In（未来 GPIO 同步方案）
light.trigger_input_line=Line1

# ============================================================================
# 光源通道映射（逻辑 light_index → FL-ACDH physical_channel）
# ============================================================================
# 参数说明：
#   physical_channel  = FL-ACDH 输出通道号 (1-4)
#   exposure_us       = 相机曝光时间 (µs)，需 ≥ strobe_width_us
#   strobe_width_us   = 频闪脉宽 (µs)，即闪光持续时间
#   trigger_delay_us  = 收到同步信号后延时触发 (µs)
#   gain              = 相机模拟增益 (1.0 = 0dB)
#   current_percent   = 光源电流百分比 (1-100)

# 光源 1 — 主照明（通道 1）
light.1.physical_channel=1
light.1.exposure_us=800
light.1.strobe_width_us=700
light.1.trigger_delay_us=10
light.1.gain=1.0
light.1.current_percent=60

# 光源 2 — 侧向补光（通道 2）
light.2.physical_channel=2
light.2.exposure_us=800
light.2.strobe_width_us=700
light.2.trigger_delay_us=10
light.2.gain=1.0
light.2.current_percent=60

# 光源 3 — 低角度打光（通道 3）
light.3.physical_channel=3
light.3.exposure_us=800
light.3.strobe_width_us=650
light.3.trigger_delay_us=10
light.3.gain=1.0
light.3.current_percent=55

# ============================================================================
# JSON 详细结果输出（可选）
# ============================================================================
json_output.enabled=false
json_output.host=192.168.1.100
json_output.port=9002

# ============================================================================
# 图像落盘（调试/抽检用，生产环境建议关闭）
# ============================================================================
image_save.enabled=false
image_save.root_dir=images
image_save.save_original=true
image_save.cleanup_enabled=true
image_save.cleanup_min_free_ratio=0.20
image_save.cleanup_trace_root=true
image_save.fail_on_save_error=true

# ============================================================================
# 故障注入 — 生产环境必须全部为 false
# ============================================================================
simulate_light_fault=false
simulate_missing_frame=false
simulate_signal_result_fault=false
simulate_trigger_timeout=false
simulate_robot_fault=false
