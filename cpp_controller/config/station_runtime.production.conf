# 座椅表面 AOI 正式生产配置
# 固定双机位 + 1 台 FL-ACDH 光源控制器 + 3 路共享频闪光源
#
# 当前产线接线事实：
# - 工控机 RS232/USB 转串口 -> FL-ACDH 串口，当前为 COM1 / 9600 8N1。
# - FL-ACDH 同步输出 F1~F3 已短接合成一根触发线，并联到两台相机黄色 Line0。
# - FL-ACDH GND 需要与两台相机 IO GND 共地。
# - 相机 Line1 ExposureStartActive 仅保留为调试/示波器输出，不参与当前触发闭环。
# - FL-ACDH 通道 1/2/3 -> 三路共享频闪光源。
# - C++ 在每个光源轮次先 arm 所有相机，再向 FL-ACDH 发送 8/9/A/7
#   完整点亮序列；相机由 FL-ACDH 同步输出触发曝光。
#
# 正式部署启动顺序：
# 1. 先启动 Python detector，并必须传入本配置，确保共享内存 slot 尺寸一致。
# 2. 再启动 C++ 主控 --loop，监听外部 tcp_signal 并执行相机/频闪/检测闭环。
# 3. 最后启动 display_app，只读 trace_root 下的 display_latest.json 和事件日志。
#
# 放行前必须通过：
# - seat_aoi_controller.exe --config cpp_controller\config\station_runtime.production.conf --validate-config
# - uv run python -m tools.validate_model_assets --recipe seat_a_black_leather_production_v1
# - uv run python -m tools.validate_deployment_preflight --strict-production

hardware_mode=production

signal.backend=tcp_signal
camera.backend=hikrobot_mvs
light.backend=serial_ascii

reset_shared_memory=true
slot_count=4
# 2 相机 x 3 频闪轮次 = 6 帧；4096 x 3072 Mono8 约 72 MB，128 MB 留安全余量。
frame_slot_size=134217728
result_slot_size=65536

publish_timeout_ms=1000
detector_timeout_ms=5000
trigger_timeout_ms=1000
camera_timeout_ms=5000
light_timeout_ms=3000
# arm 完成后到触发频闪前的相机稳定等待 (ms)，真实相机每轮更新曝光/增益后需要留出应用时间
arm_settle_ms=50
# 单台相机连续失败多少次后自动重启该相机 (stop+start)，0 禁用
max_camera_failures_before_reset=2
warning_recheck_threshold=3
critical_recheck_threshold=5
max_jobs=0

recipe_id=seat_a_black_leather_production_v1
controller_mode=online
capture_mode=fixed_camera
capture_schedule=shared_light_parallel
light_order=1,2,3
# 正式生产 trace 根目录。C++ 事件日志、Python display_latest.json、
# display_events.jsonl、raw/ROI/overlay 图都写入这里；display_app 必须使用同一路径。
trace_root=trace

signal.station_id=LINE1_AOI_01
signal.default_seat_id=EXTERNAL_SEAT
signal.default_sku=seat_a_black_leather
# C++ 作为 TCP 服务端监听外部上位机/PLC 网关。生产现场不要让 display_app
# 手动触发客户端同时抢占该端口，除非已经确认连接仲裁策略。
signal.port=9000
signal.delimiter=
signal.terminator=\n
signal.ok_response=ok\n
# 两步 TCP 信号协议: 外部工控机先发到位信号(start), 再发条码(sn <barcode>)
signal.protocol_mode=start_sn
signal.start_command=start
signal.sn_prefix=sn
signal.start_ack=start_ack\n
signal.sn_ack=sn_ack\n
# 结果回传目标。若现场结果直接复用已连接的触发 TCP 客户端，可以把
# result_host/result_port 留空；当前配置按独立结果接收端填写。
signal.result_host=192.168.10.100
signal.result_port=9001
signal.result_prefix=result
signal.result_delimiter=|
signal.ok_text=OK
signal.ng_text=NG
signal.recheck_text=RECHECK
signal.error_text=ERROR
signal.trigger_queue_path=
signal.result_queue_path=

camera.0.camera_id=TOP_BACK
camera.0.serial_number=DA9184656
camera.0.calibration_id=calib/top_back_production_v1
camera.0.width=4096
camera.0.height=3072
camera.0.channels=1
camera.0.pixel_format=Mono8
camera.0.trigger_line=Line0
camera.0.exposure_output_line=Line1
camera.0.buffer_count=8

camera.1.camera_id=TOP_CUSHION
camera.1.serial_number=DA9184665
camera.1.calibration_id=calib/top_cushion_production_v1
camera.1.width=4096
camera.1.height=3072
camera.1.channels=1
camera.1.pixel_format=Mono8
camera.1.trigger_line=Line0
camera.1.exposure_output_line=Line1
camera.1.buffer_count=8

light.device_id=FL-ACDH-20048-4
light.serial_port=COM1
light.baud_rate=9600
# 按外部已验证程序保持每条 FL-ACDH 命令等待 '$' ACK，用 ACK 节拍避免 7 命令过早发出。
light.response_mode=ack
# 当前字段记录 FL-ACDH 同步输出触发总线；现场 F1~F3 已合线到相机 Line0。
light.trigger_input_line=F1

light.1.physical_channel=1
light.1.exposure_us=30000
light.1.strobe_width_us=300
light.1.trigger_delay_us=10
light.1.gain=1.0
light.1.current_percent=60

light.2.physical_channel=2
light.2.exposure_us=30000
light.2.strobe_width_us=500
light.2.trigger_delay_us=10
light.2.gain=1.0
light.2.current_percent=60

light.3.physical_channel=3
light.3.exposure_us=30000
light.3.strobe_width_us=700
light.3.trigger_delay_us=10
light.3.gain=1.0
light.3.current_percent=55

image_save.enabled=false
# 生产在线模式默认不额外保存 C++ 原始采图副本，原图/ROI/overlay 由 Python trace 策略保存。
# 如需临时留存 C++ 采图原图，应先确认磁盘容量，再改 image_save.enabled=true。
image_save.root_dir=images
image_save.save_original=true
image_save.cleanup_enabled=true
image_save.cleanup_min_free_ratio=0.20
image_save.cleanup_trace_root=true
image_save.fail_on_save_error=true

simulate_light_fault=false
simulate_missing_frame=false
simulate_signal_result_fault=false
simulate_trigger_timeout=false
