# 机器人飞拍生产配置模板。
# 复制为 station_runtime.robot_flyshot.production.conf 后替换 TODO_*，再接入 FANUC/IO、相机和频闪真实驱动。

hardware_mode=production
plc.backend=modbus_tcp
camera.backend=hikrobot_mvs
light.backend=serial_ascii
robot.backend=vendor_sdk

reset_shared_memory=true
slot_count=4
frame_slot_size=67108864
result_slot_size=65536

publish_timeout_ms=1000
detector_timeout_ms=5000
trigger_timeout_ms=1000
camera_timeout_ms=300
light_timeout_ms=300
warning_recheck_threshold=3
critical_recheck_threshold=5
max_jobs=0

recipe_id=seat_a_robot_flyshot_v1
capture_mode=robot_flyshot
light_order=1,2,3,4
trigger_sync_mode=camera_exposure_output
trace_root=trace

plc.host=TODO_PLC_IP
plc.port=502
plc.station_id=TODO_LINE1_STATION_AOI_ROBOT
plc.trigger_source=TODO_SEAT_READY
plc.trigger_id_source=TODO_TRIGGER_ID
plc.seat_id_source=TODO_SEAT_ID
plc.sku_source=TODO_SKU
plc.ok_output=TODO_DO_OK
plc.ng_output=TODO_DO_NG
plc.recheck_output=TODO_DO_RECHECK
plc.ack_input=TODO_DI_PLC_ACK
plc.output_hold_ms=200

robot.controller_id=TODO_FANUC_M20ID25
robot.host=TODO_ROBOT_IP_OR_IO_GATEWAY
robot.port=8193
robot.ready_input=TODO_ROBOT_READY
robot.fault_input=TODO_ROBOT_FAULT
robot.start_output=TODO_AOI_START

camera.0.camera_id=EYE_IN_HAND
camera.0.serial_number=TODO_EYE_IN_HAND_CAMERA_SN
camera.0.calibration_id=calib/t1_robot_v1
camera.0.width=2448
camera.0.height=2048
camera.0.channels=1
camera.0.pixel_format=Mono8
camera.0.trigger_line=Line0
camera.0.exposure_output_line=Line1
camera.0.buffer_count=8

pose.0.pose_id=T1_BACKREST
pose.0.camera_index=0
pose.0.camera_id=EYE_IN_HAND
pose.0.calibration_id=calib/t1_robot_v1
pose.0.shot_id_source=TODO_SHOT_ID_T1
pose.0.robot_ready_input=TODO_READY_T1
pose.0.robot_fault_input=TODO_ROBOT_FAULT
pose.0.photo_trigger_input=TODO_PHOTO_TRIGGER_T1
pose.0.robot_tcp_xyz_mm=0,0,0
pose.0.robot_rpy_deg=0,0,0

pose.1.pose_id=T2_CUSHION
pose.1.camera_index=0
pose.1.camera_id=EYE_IN_HAND
pose.1.calibration_id=calib/t2_robot_v1
pose.1.shot_id_source=TODO_SHOT_ID_T2
pose.1.robot_ready_input=TODO_READY_T2
pose.1.robot_fault_input=TODO_ROBOT_FAULT
pose.1.photo_trigger_input=TODO_PHOTO_TRIGGER_T2
pose.1.robot_tcp_xyz_mm=0,0,0
pose.1.robot_rpy_deg=0,0,0

light.device_id=TODO_STROBE_CONTROLLER_ID
light.serial_port=/dev/ttyUSB0
light.baud_rate=115200
light.trigger_input_line=TODO_TRIGGER_IN_FROM_CAMERA_EXPOSURE_OUT

light.1.physical_channel=1
light.1.exposure_us=800
light.1.strobe_width_us=700
light.1.trigger_delay_us=10
light.1.gain=1.0
light.1.current_percent=60

light.2.physical_channel=2
light.2.exposure_us=800
light.2.strobe_width_us=700
light.2.trigger_delay_us=10
light.2.gain=1.0
light.2.current_percent=60

light.3.physical_channel=3
light.3.exposure_us=800
light.3.strobe_width_us=650
light.3.trigger_delay_us=10
light.3.gain=1.0
light.3.current_percent=55

light.4.physical_channel=4
light.4.exposure_us=800
light.4.strobe_width_us=650
light.4.trigger_delay_us=10
light.4.gain=1.0
light.4.current_percent=55

simulate_light_fault=false
simulate_missing_frame=false
simulate_plc_output_fault=false
simulate_trigger_timeout=false
simulate_robot_fault=false
